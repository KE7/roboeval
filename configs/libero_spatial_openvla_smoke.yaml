# robo-eval smoke config: OpenVLA x libero_spatial (10 episodes per task, 1 task)
#
# Usage: robo-eval run --config configs/libero_spatial_openvla_smoke.yaml
#
# Requires:
#   VLA server : .venvs/openvla/bin/python -m sims.vla_policies.openvla_policy --port 5101
#   Sim worker : MUJOCO_GL=egl .venvs/libero/bin/python -m sims.sim_worker \
#                  --sim libero --port 5300 --headless

name: libero_spatial_openvla_smoke

# VLA server (openvla default port is 5101; avoids collision with pi05 on 5100)
vla: openvla
vla_url: http://localhost:5101

# Sim
sim: libero
sim_url: http://localhost:5300
suite: libero_spatial

# Episodes
episodes_per_task: 10
max_tasks: 1

# VLM
no_vlm: true

# Action
delta_actions: true

# Python for subprocess (defaults to sys.executable if empty)
eval_python: ""

# Output
output_dir: results/libero_spatial_openvla_smoke

# Extra params passed to run_sim_eval.py (key -> value)
params: {}
