# roboeval smoke config (LITEN): Pi 0.5 × libero_spatial (1 episode, 1 task)
#
# Usage:
#   roboeval serve --vla pi05 --sim libero --headless &
#   roboeval run -c configs/libero_spatial_pi05_liten_smoke.yaml

# LITEN mode smoke check.

name: libero_spatial_pi05_liten_smoke

# VLA server
vla: pi05
vla_url: http://localhost:5100

# Sim
sim: libero
sim_url: http://localhost:5300
suite: libero_spatial

# Episodes — 10 episodes on 1 task for a smoke check
episodes_per_task: 10
max_tasks: 1

# LITEN hierarchical mode using a VLM planner on localhost:8000
no_vlm: false
vlm_model: Qwen/Qwen3.6-27B-FP8
vlm_endpoint: localhost:8000

# Action
delta_actions: true

# Python for subprocess (defaults to sys.executable if empty)
eval_python: ""

# Output
output_dir: results/libero_spatial_pi05_liten_smoke

# Extra params passed to roboeval.run_sim_eval (key -> value)
params: {}
