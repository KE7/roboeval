# POSTFIX-RERUN PATCH (4) + (6b): seed-deterministic Scenic
# generation-rejection skip-list, scoped per (suite, task) so a list
# authored for one experiment cannot leak into another.
#
# Source: results/neurips2026/postfix_rerun/exp3_parallel/_logs/{combined_task0,combined_task1}/run.log
# These episode indices reproducibly fail Scenic's `generate scenario in
# 25000 iterations` rejection sampling under run_seed=42 for the
# libero_infinity_goal suite combined-perturbation tasks. Skipping them
# up-front avoids burning ~25 GPU-seconds per failure.
#
# Schema (POSTFIX-RERUN PATCH (6b)):
#   seed: <int>                      # informational
#   per_suite_task:
#     "<suite>":
#       "<task>": [int, ...]
#   legacy_per_task_suite: <suite>   # gate for the legacy `indices:`
#                                    # and `per_task:` lists below; only
#                                    # honored when the caller's suite
#                                    # matches. This prevents the
#                                    # cross-experiment leakage that
#                                    # showed up on exp4 task8 (suite
#                                    # libero_infinity_spatial) when this
#                                    # file was authored for exp3
#                                    # combined_task0/1 (suite
#                                    # libero_infinity_goal).

seed: 42

