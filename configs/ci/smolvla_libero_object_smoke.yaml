# CI smoke config: smolvla × libero_object
#
# Gate: ≥1/10 episodes succeed (smoke, not benchmark).
# Reference run: 86.7% on 15 episodes.
# Mode: no-vlm (direct instruction, delta-actions).
# Expected runtime: ~10 min on GB10 (10 eps × ~60 s/ep).
#
# Requires (started by CI before robo-eval run):
#   VLA server : python -m sims.vla_policies.smolvla_policy --port 5101
#   Sim worker : python -m sims.sim_worker --sim libero --port 5300 --headless

name: ci_smolvla_libero_object_smoke

vla: smolvla
vla_url: http://localhost:5101

sim: libero
sim_url: http://localhost:5300
suite: libero_object

# Smoke gate: 10 episodes on 1 task.
episodes_per_task: 10
max_tasks: 1

no_vlm: true
delta_actions: true

eval_python: ""

output_dir: results/ci

params: {}
