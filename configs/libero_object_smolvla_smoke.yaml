# roboeval smoke config: smolvla x libero_object (10 episodes, 1 task)
# Usage:
#   roboeval serve --vla smolvla --sim libero --headless &
#   roboeval run -c configs/libero_object_smolvla_smoke.yaml

name: libero_object_smolvla_smoke

# VLA server (smolvla default port is 5102 per config)
vla: smolvla
vla_url: http://localhost:5102

# Sim
sim: libero
sim_url: http://localhost:5300
suite: libero_object

# Episodes
episodes_per_task: 10
max_tasks: 1

# VLM
no_vlm: true

# Action
delta_actions: true

# Python for subprocess (defaults to sys.executable if empty)
eval_python: ""

# Output
output_dir: results/libero_object_smolvla_smoke

# Extra params passed to roboeval.run_sim_eval (key -> value)
params: {}
