# roboeval smoke config: Pi 0.5 × LIBERO-Infinity (smoke run)
#
# Usage:
#   roboeval serve --vla pi05 --sim libero_infinity --headless &
#   roboeval run -c configs/libero_infinity_pi05_liten_smoke.yaml

# LIBERO-Infinity is the Scenic-driven open-ended perturbation extension of
# LIBERO. Suites are named libero_infinity_<base> and reuse LIBERO's 7-dim
# pd_ee_delta_pose action contract; Pi 0.5 drives it natively.

name: libero_infinity_pi05_smoke_liten

vla: pi05
vla_url: http://localhost:5100

sim: libero_infinity
sim_url: http://localhost:5308
suite: libero_infinity_spatial
# LIBERO-Infinity tasks are resolved by name within the libero_infinity_spatial suite.
task: ""

episodes_per_task: 10
max_tasks: 1

delta_actions: true


# Hierarchical mode with a VLM planner on vLLM localhost:8000.
no_vlm: false
vlm_model: Qwen/Qwen3.6-27B-FP8
vlm_endpoint: localhost:8000

eval_python: ""

output_dir: results/libero_infinity_pi05_smoke

params: {}
