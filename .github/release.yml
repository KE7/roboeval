changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "⚠️ Breaking Changes"
      labels:
        - breaking
    - title: "🚀 New Features"
      labels:
        - feat
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - fix
        - bugfix
        - bug
    - title: "📖 Documentation"
      labels:
        - docs
        - documentation
    - title: "🔧 Other Changes"
      labels:
        - "*"
